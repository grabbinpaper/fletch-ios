name: FieldWork
options:
  bundleIdPrefix: com.stoneflow
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

configFiles:
  Debug: Config/Debug.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  FieldWork:
    type: application
    platform: iOS
    sources:
      - FieldWork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stoneflow.fieldwork
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "FieldWork needs camera access to take photos of job sites and surfaces."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "FieldWork uses your location to record GPS coordinates during site visits."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "FieldWork needs photo library access to attach existing photos to jobs."
        SWIFT_STRICT_CONCURRENCY: complete
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: FieldWork/Resources/FieldWork.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
