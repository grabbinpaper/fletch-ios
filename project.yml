name: FieldWork
options:
  bundleIdPrefix: com.stoneflow
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

configFiles:
  Debug: Config/Debug.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  FieldWork:
    type: application
    platform: iOS
    sources:
      - FieldWork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stoneflow.fieldwork
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: FieldWork
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: FieldWork/Resources/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "FieldWork needs camera access to take photos of job sites and surfaces."
        NSLocationWhenInUseUsageDescription: "FieldWork uses your location to record GPS coordinates during site visits."
        NSPhotoLibraryUsageDescription: "FieldWork needs photo library access to attach existing photos to jobs."
        SUPABASE_HOST: "$(SUPABASE_HOST)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
    entitlements:
      path: FieldWork/Resources/FieldWork.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
